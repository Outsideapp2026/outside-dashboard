// ============ UTILITY FUNCTIONS ============
function formatCurrency(n) { return "$" + n.toLocaleString(); }
function formatDate(d) { return d.toLocaleDateString("en-CA", { weekday: "long", year: "numeric", month: "long", day: "numeric" }); }
function pct(a, b) { if (!b) return 0; return Math.round(((a - b) / b) * 100); }
// ============ WEEKLY REPORT GENERATOR ============
function generateWeeklyReport(bookmarks, weekData) {
  const now = new Date();
  const lastWeek = weekData[weekData.length - 1] || {};
  const prevWeek = weekData[weekData.length - 2] || {};
  const revChange = pct(lastWeek.revenue, prevWeek.revenue);
  const activeBookmarks = bookmarks.filter(b => b.status === "active");
  const byCategory = {};
  bookmarks.forEach(b => { byCategory[b.category] = (byCategory[b.category] || 0) + 1; });
  const byFolder = {};
  bookmarks.forEach(b => { byFolder[b.folder] = (byFolder[b.folder] || 0) + 1; });

  const report = [
    "OUTSIDE â WEEKLY BUSINESS REPORT",
    "Week ending: " + formatDate(now),
    "Generated: " + now.toISOString(),
    "=".repeat(50),
    "",
    "ð° FINANCIAL SUMMARY",
    "-".repeat(30),
    "Revenue:       " + formatCurrency(lastWeek.revenue || 0) + (revChange !== 0 ? " (" + (revChange > 0 ? "â²" : "â¼") + Math.abs(revChange) + "% vs prev week)" : ""),
    "Expenses:      " + formatCurrency(lastWeek.expenses || 0),
    "Net Profit:    " + formatCurrency(lastWeek.profit || 0),
    "Orders:        " + (lastWeek.orders || 0),
    "Downloads:     " + (lastWeek.downloads || 0),
    "",
    "ð BOOKMARKS SUMMARY (" + bookmarks.length + " total)",
    "-".repeat(30),
    "Active: " + activeBookmarks.length + " | Passive: " + (bookmarks.length - activeBookmarks.length),
    "",
    "By Category:",
    ...Object.entries(byCategory).map(([k, v]) => "  " + k + ": " + v),
    "",
    "By Folder:",
    ...Object.entries(byFolder).map(([k, v]) => "  " + k + ": " + v),
    "",
    "ð ACTIVE BOOKMARKS",
    "-".repeat(30),
    ...activeBookmarks.map(b => ["  â¸ " + b.name, "    URL: " + b.url, "    Category: " + b.category + " | Folder: " + b.folder, b.notes ? "    Notes: " + b.notes : "", ""].join("\n")),
    "",
    "=".repeat(50),
    "Report generated by Outside Dashboard v1.0",
  ].join("\n");

  const blob = new Blob([report], { type: "text/plain" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "outside-weekly-report-" + now.toISOString().split("T")[0] + ".txt";
  a.click();
  URL.revokeObjectURL(url);
  return report;
}
// ============ BOOKMARK MANAGER COMPONENT ============
function BookmarkManager({ bookmarks, setBookmarks }) {
  const [search, setSearch] = useState("");
  const [filterCat, setFilterCat] = useState("All");
  const [filterFolder, setFilterFolder] = useState("All");
  const [filterStatus, setFilterStatus] = useState("All");
  const [showModal, setShowModal] = useState(false);
  const [editingId, setEditingId] = useState(null);
  const [showImport, setShowImport] = useState(false);
  const [chromeImportStatus, setChromeImportStatus] = useState("");
  const [importText, setImportText] = useState("");
  const [viewMode, setViewMode] = useState("grid");
  const [form, setForm] = useState({ name: "", url: "", category: "", folder: "", status: "active", notes: "" });

  const categories = ["All", ...new Set(bookmarks.map(b => b.category))];
  const folders = ["All", ...new Set(bookmarks.map(b => b.folder))];

  const filtered = bookmarks.filter(b => {
    const q = search.toLowerCase();
    const ms = !q || b.name.toLowerCase().includes(q) || b.url.toLowerCase().includes(q) || (b.notes||"").toLowerCase().includes(q);
    const mc = filterCat === "All" || b.category === filterCat;
    const mf = filterFolder === "All" || b.folder === filterFolder;
    const mst = filterStatus === "All" || b.status === filterStatus;
    return ms && mc && mf && mst;
  });

  const openAdd = () => {
    setForm({ name: "", url: "", category: "", folder: "", status: "active", notes: "" });
    setEditingId(null);
    setShowModal(true);
  };

  const openEdit = (bm) => {
    setForm({ name: bm.name, url: bm.url, category: bm.category, folder: bm.folder, status: bm.status, notes: bm.notes || "" });
    setEditingId(bm.id);
    setShowModal(true);
  };

  const save = () => {
    if (!form.name || !form.url) return alert("Name and URL are required");
    const url = form.url.startsWith("http") ? form.url : "https://" + form.url;
    if (editingId) {
      setBookmarks(p => p.map(b => b.id === editingId ? { ...b, ...form, url } : b));
    } else {
      setBookmarks(p => [...p, { ...form, url, id: Date.now() }]);
    }
    setShowModal(false);
  };

  const remove = (id) => {
    if (window.confirm("Delete this bookmark?")) setBookmarks(p => p.filter(b => b.id !== id));
  };

  const doExport = () => {
    const blob = new Blob([JSON.stringify(bookmarks, null, 2)], { type: "application/json" });
    const a = document.createElement("a"); a.href = URL.createObjectURL(blob);
    a.download = "outside-bookmarks-" + new Date().toISOString().split("T")[0] + ".json"; a.click();
  };

  const doImport = () => {
    try {
      const data = JSON.parse(importText);
      const arr = Array.isArray(data) ? data : [];
      const withIds = arr.map((b,i) => ({ ...b, id: b.id || Date.now()+i }));
      setBookmarks(p => {
        const existing = new Set(p.map(b => b.url));
        return [...p, ...withIds.filter(b => !existing.has(b.url))];
      });
      setImportText(""); setShowImport(false);
      alert("Imported " + withIds.length + " bookmarks!");
    } catch { alert("Invalid JSON"); }
  };

  const parseChromeNodes = (node, folderName, results) => {
    if (node.type === "url") {
      results.push({ id: Date.now() + Math.random(), name: node.name || "Untitled", url: node.url || "", category: "Chrome", folder: folderName || "Chrome", status: "active", notes: "" });
    } else if (node.children) {
      node.children.forEach(child => parseChromeNodes(child, node.name || folderName, results));
    }
  };

  const handleChromeFile = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        const roots = data.roots || {};
        let all = [];
        ["bookmark_bar", "other", "synced"].forEach(key => { if (roots[key]) parseChromeNodes(roots[key], roots[key].name || key, all); });
        if (all.length === 0) { setChromeImportStatus("No bookmarks found in file."); return; }
        setBookmarks(prev => {
          const existingUrls = new Set(prev.map(b => b.url));
          const newOnes = all.filter(b => b.url && !existingUrls.has(b.url));
          setChromeImportStatus("Imported " + newOnes.length + " new bookmarks! (" + (all.length - newOnes.length) + " duplicates skipped)");
          return [...prev, ...newOnes];
        });
        e.target.value = "";
      } catch(err) { setChromeImportStatus("Error: not a valid Chrome Bookmarks file."); }
    };
    reader.readAsText(file);
  };

  return (
    <div className="p-4 md:p-6">
      {/* Header Controls */}
      <div className="flex flex-wrap gap-3 mb-5 items-center justify-between">
        <div className="flex flex-wrap gap-2">
          <input type="text" placeholder="ð Search bookmarks..." value={search} onChange={e=>setSearch(e.target.value)}
            className="bg-gray-800 border border-gray-700 rounded-xl px-3 py-2 text-sm text-white w-44 focus:outline-none focus:border-indigo-500" />
          <select value={filterCat} onChange={e=>setFilterCat(e.target.value)}
            className="bg-gray-800 border border-gray-700 rounded-xl px-3 py-2 text-sm text-white focus:outline-none">
            {categories.map(c => <option key={c}>{c}</option>)}
          </select>
          <select value={filterFolder} onChange={e=>setFilterFolder(e.target.value)}
            className="bg-gray-800 border border-gray-700 rounded-xl px-3 py-2 text-sm text-white focus:outline-none">
            {folders.map(f => <option key={f}>{f}</option>)}
          </select>
          <select value={filterStatus} onChange={e=>setFilterStatus(e.target.value)}
            className="bg-gray-800 border border-gray-700 rounded-xl px-3 py-2 text-sm text-white focus:outline-none">
            <option>All</option><option value="active">Active</option><option value="passive">Passive</option>
          </select>
        </div>
        <div className="flex flex-wrap gap-2">
          <button onClick={openAdd} className="bg-indigo-600 hover:bg-indigo-500 text-white px-4 py-2 rounded-xl text-sm font-medium">+ Add</button>
          <button onClick={()=>setShowImport(v=>!v)} className="bg-gray-700 hover:bg-gray-600 text-white px-3 py-2 rounded-xl text-sm">ð¥ Import</button>
          <button onClick={doExport} className="bg-gray-700 hover:bg-gray-600 text-white px-3 py-2 rounded-xl text-sm">ð¤ Export</button>
          <label className="cursor-pointer bg-purple-700 hover:bg-purple-600 text-white px-3 py-2 rounded-xl text-sm flex items-center gap-1">ð Chrome<input type="file" accept="*" onChange={handleChromeFile} className="hidden" /></label>
          <div className="flex rounded-xl overflow-hidden border border-gray-700">
            <button onClick={()=>setViewMode("grid")} className={`px-3 py-2 text-sm ${viewMode==="grid"?"bg-indigo-600 text-white":"bg-gray-800 text-gray-400"}`}>â</button>
            <button onClick={()=>setViewMode("list")} className={`px-3 py-2 text-sm ${viewMode==="list"?"bg-indigo-600 text-white":"bg-gray-800 text-gray-400"}`}>â¡</button>
          </div>
        </div>
      </div>

      {/* Import Panel */}
      {showImport && (
        <div className="bg-gray-800 border border-gray-700 rounded-2xl p-4 mb-4">
          <p className="text-sm text-gray-300 mb-2 font-medium">Import Bookmarks (JSON format)</p>
          <p className="text-xs text-gray-500 mb-2">Format: [{`{"name":"Site","url":"https://...","category":"Work","folder":"Tools","status":"active"}`}]</p>
          <textarea value={importText} onChange={e=>setImportText(e.target.value)}
            placeholder='[{"name":"My Site","url":"https://example.com","category":"Work","folder":"Tools"}]'
            className="w-full h-24 bg-gray-900 border border-gray-600 rounded-xl p-3 text-xs text-green-400 font-mono resize-none focus:outline-none" />
          <div className="flex gap-2 mt-2">
            <button onClick={doImport} className="bg-indigo-600 hover:bg-indigo-500 text-white px-4 py-2 rounded-xl text-sm">Import</button>
            <button onClick={()=>setShowImport(false)} className="bg-gray-700 text-white px-4 py-2 rounded-xl text-sm">Cancel</button>
          </div>
        </div>
      )}
      {chromeImportStatus && (
        <div className="bg-purple-900/30 border border-purple-700/50 rounded-xl px-4 py-2 mb-3 text-sm text-purple-300 flex items-center justify-between">
          <span>ð {chromeImportStatus}</span>
          <button onClick={()=>setChromeImportStatus("")} className="text-purple-400 hover:text-white ml-3">×</button>
        </div>
      )}

      <div className="text-xs text-gray-500 mb-3">{filtered.length} of {bookmarks.length} bookmarks</div>
      {/* Grid View */}
      {viewMode === "grid" && (
        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-3">
          {filtered.map(bm => (
            <div key={bm.id} className="bookmark-card bg-gray-800 border border-gray-700 hover:border-indigo-600/50 rounded-2xl p-4 flex flex-col gap-2">
              <div className="flex items-start gap-2">
                <span className={`mt-1 w-2 h-2 rounded-full flex-shrink-0 ${bm.status==="active"?"bg-green-400":"bg-gray-600"}`}></span>
                <div className="flex-1 min-w-0">
                  <h3 className="text-sm font-semibold text-white leading-tight">{bm.name}</h3>
                  <p className="text-xs text-gray-500 truncate mt-0.5">{bm.url}</p>
                </div>
              </div>
              <div className="flex gap-1 flex-wrap">
                <span className="bg-indigo-900/40 text-indigo-300 text-xs px-2 py-0.5 rounded-full">{bm.category}</span>
                <span className="bg-gray-700/60 text-gray-300 text-xs px-2 py-0.5 rounded-full">{bm.folder}</span>
              </div>
              {bm.notes && <p className="text-xs text-gray-500 italic leading-relaxed">{bm.notes}</p>}
              <div className="flex gap-1.5 mt-auto pt-2 border-t border-gray-700/50">
                <a href={bm.url} target="_blank" rel="noopener noreferrer"
                  className="flex-1 text-center text-xs bg-indigo-600/20 hover:bg-indigo-600/40 text-indigo-300 py-1.5 rounded-lg transition-colors">
                  Open â
                </a>
                <button onClick={()=>openEdit(bm)} className="text-xs bg-gray-700 hover:bg-gray-600 text-white px-3 py-1.5 rounded-lg">Edit</button>
                <button onClick={()=>remove(bm.id)} className="text-xs bg-red-900/20 hover:bg-red-900/50 text-red-400 px-2.5 py-1.5 rounded-lg">Ã</button>
              </div>
            </div>
          ))}
        </div>
      )}

      {/* List View */}
      {viewMode === "list" && (
        <div className="flex flex-col gap-2">
          {filtered.map(bm => (
            <div key={bm.id} className="bg-gray-800 border border-gray-700 hover:border-indigo-600/40 rounded-xl p-3 flex items-center gap-3 transition-colors">
              <span className={`w-2 h-2 rounded-full flex-shrink-0 ${bm.status==="active"?"bg-green-400":"bg-gray-600"}`}></span>
              <div className="flex-1 min-w-0">
                <div className="flex items-center gap-2 flex-wrap">
                  <span className="text-sm font-medium text-white">{bm.name}</span>
                  <span className="text-xs text-indigo-400 bg-indigo-900/30 px-1.5 py-0.5 rounded">{bm.category}</span>
                  <span className="text-xs text-gray-500">{bm.folder}</span>
                </div>
                <p className="text-xs text-gray-500 truncate">{bm.url}</p>
              </div>
              <div className="flex gap-1.5 flex-shrink-0">
                <a href={bm.url} target="_blank" rel="noopener noreferrer"
                  className="text-xs bg-indigo-600/20 hover:bg-indigo-600/40 text-indigo-300 px-3 py-1.5 rounded-lg">Open â</a>
                <button onClick={()=>openEdit(bm)} className="text-xs bg-gray-700 hover:bg-gray-600 text-white px-3 py-1.5 rounded-lg">Edit</button>
                <button onClick={()=>remove(bm.id)} className="text-xs bg-red-900/20 hover:bg-red-900/50 text-red-400 px-2.5 py-1.5 rounded-lg">Ã</button>
              </div>
            </div>
          ))}
        </div>
      )}
      {/* Add/Edit Modal */}
      {showModal && (
        <div className="fixed inset-0 bg-black/80 flex items-center justify-center z-50 p-4">
          <div className="bg-gray-900 border border-gray-700 rounded-2xl p-6 w-full max-w-md shadow-2xl">
            <h3 className="text-lg font-bold mb-5">{editingId ? "âï¸ Edit Bookmark" : "+ Add Bookmark"}</h3>
            <div className="space-y-3">
              <div>
                <label className="text-xs text-gray-400 mb-1 block">Name *</label>
                <input value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))}
                  className="w-full bg-gray-800 border border-gray-600 rounded-xl px-3 py-2.5 text-sm text-white focus:outline-none focus:border-indigo-500"
                  placeholder="Site name" />
              </div>
              <div>
                <label className="text-xs text-gray-400 mb-1 block">URL *</label>
                <input value={form.url} onChange={e=>setForm(f=>({...f,url:e.target.value}))}
                  className="w-full bg-gray-800 border border-gray-600 rounded-xl px-3 py-2.5 text-sm text-white focus:outline-none focus:border-indigo-500"
                  placeholder="https://example.com" />
              </div>
              <div className="grid grid-cols-2 gap-3">
                <div>
                  <label className="text-xs text-gray-400 mb-1 block">Category</label>
                  <input value={form.category} onChange={e=>setForm(f=>({...f,category:e.target.value}))}
                    className="w-full bg-gray-800 border border-gray-600 rounded-xl px-3 py-2.5 text-sm text-white focus:outline-none"
                    placeholder="e.g. Social" />
                </div>
                <div>
                  <label className="text-xs text-gray-400 mb-1 block">Folder</label>
                  <input value={form.folder} onChange={e=>setForm(f=>({...f,folder:e.target.value}))}
                    className="w-full bg-gray-800 border border-gray-600 rounded-xl px-3 py-2.5 text-sm text-white focus:outline-none"
                    placeholder="e.g. Marketing" />
                </div>
              </div>
              <div>
                <label className="text-xs text-gray-400 mb-1 block">Status</label>
                <select value={form.status} onChange={e=>setForm(f=>({...f,status:e.target.value}))}
                  className="w-full bg-gray-800 border border-gray-600 rounded-xl px-3 py-2.5 text-sm text-white focus:outline-none">
                  <option value="active">ð¢ Active</option>
                  <option value="passive">âª Passive</option>
                </select>
              </div>
              <div>
                <label className="text-xs text-gray-400 mb-1 block">Notes</label>
                <input value={form.notes} onChange={e=>setForm(f=>({...f,notes:e.target.value}))}
                  className="w-full bg-gray-800 border border-gray-600 rounded-xl px-3 py-2.5 text-sm text-white focus:outline-none"
                  placeholder="Optional notes" />
              </div>
            </div>
            <div className="flex gap-3 mt-5">
              <button onClick={save} className="flex-1 bg-indigo-600 hover:bg-indigo-500 text-white py-2.5 rounded-xl text-sm font-medium">
                {editingId ? "Save Changes" : "Add Bookmark"}
              </button>
              <button onClick={()=>setShowModal(false)} className="flex-1 bg-gray-700 hover:bg-gray-600 text-white py-2.5 rounded-xl text-sm">Cancel</button>
            </div>
          </div>
        </div>
      )}
