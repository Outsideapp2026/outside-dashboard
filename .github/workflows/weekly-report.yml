name: Weekly Report Reminder

on:
  schedule:
    # Every Monday at 9:00 AM UTC (5:00 AM Toronto time EST)
    - cron: '0 9 * * 1'
  workflow_dispatch:  # Also allows manual trigger from GitHub Actions tab

jobs:
  weekly-report:
    runs-on: ubuntu-latest

    steps:
      - name: Weekly Report Reminder
        run: |
          echo "=========================================="
          echo "OUTSIDE DASHBOARD - WEEKLY REPORT REMINDER"
          echo "=========================================="
          echo ""
          echo "Date: $(date '+%A, %B %d %Y')"
          echo ""
          echo "Your weekly report is ready to download!"
          echo ""
          echo "1. Open your dashboard on your phone or desktop:"
          echo "   https://outside-dashboard.vercel.app"
          echo ""
          echo "2. Click the 'Reports' tab"
          echo ""
          echo "3. Click 'Download Weekly Report (.txt)'"
          echo ""
          echo "The report will include:"
          echo "  - Revenue, profit, orders, downloads"
          echo "  - All active bookmarks with categories"
          echo "  - Week-over-week comparisons"
          echo ""
          echo "Have a great week! 🌙"

      # Optional: Send email notification
      # To enable email: Add EMAIL_TO secret in GitHub Settings > Secrets
